<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ===== YOUR ROOT SYSTEM ===== */
:root{
  --ink:#111;
  --line:#d7d7d7;
  --soft:#f5f5f5;
  --accent-alt:#0302E7;
}

html,body{
  font-family:"EB Garamond", serif;
  background:var(--soft);
  color:var(--ink);
  overflow-x:hidden;
}

/* ============ LEFT RAIL ============ */
    .left-rail{
      position:fixed;
      left:2rem;
      top:4rem;
      display:flex;
      flex-direction:column;
      z-index:10;
      text-transform:uppercase;
      user-select:none;
      height:calc(100vh - 8rem);
    }

    .left-rail-top{
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:flex-start;
    }

    .left-rail a{
      font-size:clamp(54px, 5.2vw, 130px);
      font-weight:500;
      transform:scaleY(5.5);
      transform-origin:left center;
      letter-spacing:-0.10em;
      line-height:0.70;
      color:var(--accent-alt);
      text-decoration:none;
      transition:opacity 220ms ease;
      display:inline-block;
    }

    .left-rail a:hover{
      text-decoration:underline;
      opacity:0.75;
    }


  /* ============ RIGHT RAIL ============ */
    .right-rail{
      position:fixed;
      right:2rem;
      top:4rem;
      display:flex;
      flex-direction:column;
      gap:65px;
      z-index:10;
      text-transform:uppercase;
      user-select:none;
      align-items:flex-end;
    }

    .right-rail a,
    .right-rail span{
      font-size:clamp(54px, 5.2vw, 130px);
      font-weight:500;
      transform:scaleY(2.25);
      transform-origin:right center;
      letter-spacing:-0.10em;
      line-height:0.70;
      white-space:nowrap;
      text-decoration:none;
      color:var(--ink);
      transition:opacity 220ms ease;
    }

    .right-rail .plus{
      transform:scaleY(2.35);
      letter-spacing:-0.16em;
      opacity:.95;
      pointer-events:none;
    }

    .right-rail a:hover{
      text-decoration:underline;
      opacity:0.75;
    }

/* ===== MAIN GRID ===== */
main{
  margin-left:280px;
  margin-right:160px;
  padding:4rem 2rem;
}

.koss-title{
  font-size:clamp(54px,5.2vw,130px);
  font-weight:500;
  transform:scaleY(2.25);
  transform-origin:left center;
  letter-spacing:-0.10em;
  line-height:0.70;
  margin-bottom:80px;
  text-transform:uppercase;
}

.koss-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:80px;
}

.koss-panel{
  border:1px solid var(--line);
  padding:40px;
  background:transparent;
  display:flex;
  flex-direction:column;
  gap:30px;
}

/* ===== TYPOGRAPHY (YOUR SCALE SYSTEM) ===== */
.koss-btn,
.koss-select{
  font-size:clamp(16px,1.6vw,32px);
  font-weight:500;
  transform:scaleY(2.25);
  transform-origin:left center;
  letter-spacing:-0.10em;
  text-transform:uppercase;
  cursor:pointer;
  color:var(--accent-alt);
  background:none;
  border:none;
  padding:0;
}

.koss-btn:hover{
  text-decoration:underline;
}

.koss-select{
  color:var(--ink);
}

canvas{
  width:100%;
  height:220px;
}

img{
  max-width:100%;
  object-fit:contain;
  opacity:.95;
}

/* archive */
.archive-entry{
  border-top:1px solid var(--line);
  padding-top:20px;
  font-size:12px;
  opacity:.6;
}

<main>

<div class="koss-title">KOSS ENGINE V2 DEMO</div>

<div class="koss-grid">

<!-- LEFT PANEL -->
<div class="koss-panel">

<input type="file" id="upload" accept="image/*">

<select id="harmonicSelect" class="koss-select">
<option value="just">JUST INTONATION</option>
<option value="pythagorean">PYTHAGOREAN</option>
<option value="equal">EQUAL TEMPERAMENT</option>
</select>

<div class="koss-btn" id="play">PLAY</div>
<div class="koss-btn" id="pause">PAUSE</div>
<div class="koss-btn" id="rewind">REWIND</div>
<div class="koss-btn" id="download">DOWNLOAD WAV</div>
<div class="koss-btn" id="saveArchive">SAVE TO ARCHIVE</div>

<div id="archive"></div>

</div>

<!-- RIGHT PANEL -->
<div class="koss-panel">
<img id="preview">
<canvas id="wave"></canvas>
<canvas id="fft"></canvas>
</div>

</div>
</main>

<script>

let ctx, analyser, source, gainNode, panner;
let buffer;
let imageData;
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

const harmonicTables = {
  just:[1,5/4,3/2,2,9/8,15/8],
  pythagorean:[1,256/243,9/8,32/27,3/2,243/128],
  equal:[1,Math.pow(2,2/12),Math.pow(2,4/12),Math.pow(2,7/12),2]
};

const upload = document.getElementById("upload");
const preview = document.getElementById("preview");
const harmonicSelect = document.getElementById("harmonicSelect");

const waveCanvas = document.getElementById("wave");
const fftCanvas = document.getElementById("fft");
const waveCtx = waveCanvas.getContext("2d");
const fftCtx = fftCanvas.getContext("2d");

upload.addEventListener("change", e=>{
  const file=e.target.files[0];
  const reader=new FileReader();
  reader.onload=ev=>{
    preview.src=ev.target.result;
    const img=new Image();
    img.src=ev.target.result;
    img.onload=()=>{
      const c=document.createElement("canvas");
      c.width=img.width;
      c.height=img.height;
      const cx=c.getContext("2d");
      cx.drawImage(img,0,0);
      imageData=cx.getImageData(0,0,img.width,img.height);
      generateSound();
    }
  }
  reader.readAsDataURL(file);
});

function generateSound(){
  if(!imageData) return;

  const table=harmonicTables[harmonicSelect.value];
  const base=110;
  const duration=6;
  const sampleRate=44100;
  buffer=audioCtx.createBuffer(2,sampleRate*duration,sampleRate);

  const left=buffer.getChannelData(0);
  const right=buffer.getChannelData(1);

  const w=imageData.width;
  const h=imageData.height;
  const data=imageData.data;

  for(let i=0;i<left.length;i++){
    const t=i/sampleRate;
    const x=Math.floor((t/duration)*w);
    const idx=(x*4);
    const r=data[idx]/255;
    const g=data[idx+1]/255;
    const b=data[idx+2]/255;

    const harm=table[Math.floor(g*table.length)%table.length];
    const freq=base*harm*(0.5+r*2);

    const val=Math.sin(2*Math.PI*freq*t)*b;

    left[i]=val*(1-r);
    right[i]=val*(r);
  }
}

function playSound(){
  source=audioCtx.createBufferSource();
  source.buffer=buffer;

  analyser=audioCtx.createAnalyser();
  analyser.fftSize=2048;

  source.connect(analyser);
  analyser.connect(audioCtx.destination);

  source.start();
  drawVisuals();
}

function pauseSound(){
  if(source) source.stop();
}

function rewindSound(){
  pauseSound();
  playSound();
}

document.getElementById("play").onclick=playSound;
document.getElementById("pause").onclick=pauseSound;
document.getElementById("rewind").onclick=rewindSound;

function drawVisuals(){
  requestAnimationFrame(drawVisuals);

  waveCanvas.width=waveCanvas.offsetWidth;
  waveCanvas.height=waveCanvas.offsetHeight;

  fftCanvas.width=fftCanvas.offsetWidth;
  fftCanvas.height=fftCanvas.offsetHeight;

  const dataArray=new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteTimeDomainData(dataArray);

  waveCtx.clearRect(0,0,waveCanvas.width,waveCanvas.height);
  waveCtx.beginPath();

  const slice=waveCanvas.width/dataArray.length;
  for(let i=0;i<dataArray.length;i++){
    const v=dataArray[i]/128;
    const y=v*waveCanvas.height/2;
    waveCtx.lineTo(i*slice,y);
  }
  waveCtx.strokeStyle="#0302E7";
  waveCtx.stroke();

  analyser.getByteFrequencyData(dataArray);
  fftCtx.clearRect(0,0,fftCanvas.width,fftCanvas.height);

  for(let i=0;i<dataArray.length;i++){
    const bar=dataArray[i];
    fftCtx.fillStyle="rgba(3,2,231,.5)";
    fftCtx.fillRect(i*2,fftCanvas.height-bar/2,1,bar/2);
  }
}

document.getElementById("download").onclick=()=>{
  const wav=bufferToWav(buffer);
  const blob=new Blob([wav],{type:"audio/wav"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="koss.wav";
  a.click();
};

function bufferToWav(buffer){
  const numOfChan=buffer.numberOfChannels;
  const length=buffer.length*2*numOfChan+44;
  const array=new ArrayBuffer(length);
  const view=new DataView(array);
  let offset=0;
  function writeStr(s){for(let i=0;i<s.length;i++)view.setUint8(offset++,s.charCodeAt(i));}
  writeStr("RIFF");
  view.setUint32(offset,36+buffer.length*2*numOfChan,true); offset+=4;
  writeStr("WAVEfmt ");
  view.setUint32(offset,16,true); offset+=4;
  view.setUint16(offset,1,true); offset+=2;
  view.setUint16(offset,numOfChan,true); offset+=2;
  view.setUint32(offset,buffer.sampleRate,true); offset+=4;
  view.setUint32(offset,buffer.sampleRate*2*numOfChan,true); offset+=4;
  view.setUint16(offset,numOfChan*2,true); offset+=2;
  view.setUint16(offset,16,true); offset+=2;
  writeStr("data");
  view.setUint32(offset,buffer.length*2*numOfChan,true); offset+=4;
  const inter=new Float32Array(buffer.length*numOfChan);
  for(let ch=0;ch<numOfChan;ch++){
    const chan=buffer.getChannelData(ch);
    for(let i=0;i<buffer.length;i++){
      inter[i*numOfChan+ch]=chan[i];
    }
  }
  let idx=0;
  while(offset<length){
    const s=Math.max(-1,Math.min(1,inter[idx++]));
    view.setInt16(offset,s<0?s*0x8000:s*0x7FFF,true);
    offset+=2;
  }
  return array;
}

document.getElementById("saveArchive").onclick=()=>{
  const archive=document.getElementById("archive");
  const div=document.createElement("div");
  div.className="archive-entry";
  div.innerText="ENTRY SAVED — "+new Date().toLocaleString();
  archive.appendChild(div);
};

</script>
